name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build test container
        run: docker build -f Dockerfile.test -t gtk-js-test .

      - name: Start test container
        run: docker run -dit --name gtk-js -v "$PWD:/workspace" -w /workspace gtk-js-test bash

      - name: Install dependencies
        run: docker exec gtk-js bash -c "HOME=/root bun install"

      - name: Build packages
        run: docker exec gtk-js bun run build:packages

      - name: Build native test binary
        run: docker exec gtk-js bash -c "cd tests/native && cargo build"
